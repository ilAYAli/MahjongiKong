<!DOCTYPE html>
<html lang="eng">
  <head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=Edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
    <title>MahjongiKong</title>
    <link href="https://fonts.cdnfonts.com/css/juice-avocado" rel="stylesheet">
    <link rel="stylesheet" href="style/style.css" />
    <link type="image/x-icon" rel="shortcut icon" href="./assets/favicon.ico"/>
    
    <script src="lz-string.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  </head>
  <body>
    <div id="orientation-warning">
      <div class="warning-content">
        <div class="icon-rotate">🔄</div>
        <p>Please rotate your device to landscape mode to play MahjongiKong.</p>
      </div>
    </div>
    <div id="board">
      <div class='wrapper'>
        <div id="menu">
          <div class="dropdown">
            <button id="spriteBtn" class="dropbtn">Tileset</button>
            <div class="dropdown-content">
              <a href=".?spriteIdx=0">Neon</a>
              <a href=".?spriteIdx=1">Mahjong</a>
            </div>
          </div>
          <button id="demoBtn" class="dropbtn" onclick="demo(!board.demo_mode)">Demo</button>
          <div class="dropdown">
            <button id="highscore" class="dropbtn">Highscore</button>
            <div id="highscore_div" class="dropdown-content">
            </div>
          </div>
          <button id="hintBtn" class="dropbtn" onclick="board.hint(true)">Hint</button>
          <button id="sfxBtn" onclick="sfx.toggle()" title="Toggle sound">🎵</button>
          <div class="dropdown" id="share" style="display:none">
            <button id="shareBtn" class="dropbtn">Share</button>
            <div class="dropdown-content">
              <a href="#" id="url">LINK</a>
              <div id="qrcode"></div>
            </div>
          </div>
        </div>
        <div id="score_div">
          <canvas id="score_canvas" width="110" height="22"></canvas>
        </div>
      </div>

      <div id="board_div">
        <div id="time-bar-container"><div id="time-bar"></div></div>
        <canvas id="board_canvas" width="1024" height="768"></canvas>
      </div>

      <script src="sfx.js"> </script>
      <script src="script.js"> </script>
      <script src="highscore.js"> </script>

      <!-- Score submission modal -->
      <div id="hs-modal" style="display:none">
        <div id="hs-modal-box">
          <div id="hs-modal-title">Board Cleared!</div>
          <div id="hs-modal-score"></div>
          <input id="hs-modal-input" type="text" maxlength="20" placeholder="Your name" autocomplete="off" />
          <div id="hs-modal-buttons">
            <button id="hs-modal-submit">Submit</button>
            <button id="hs-modal-skip">Skip</button>
          </div>
        </div>
      </div>
    </div>

</html>
